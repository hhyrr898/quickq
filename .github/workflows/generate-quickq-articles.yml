name: Generate quickq articles

on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many articles to create"
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
      bing_scope:
        description: "Submit updated URLs or the full built site"
        required: true
        default: "updated"
        type: choice
        options: ["updated", "all"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: "Asia/Shanghai"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - name: Generate article markdown
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GENERATE_COUNT: ${{ github.event.inputs.count || '1' }}
        run: npm run generate:articles -- --count=${GENERATE_COUNT}
      - name: Post-process articles
        run: npm run postprocess
      - name: Commit generated articles
        id: commit
        run: |
          git add src/blog src/keywords.json src/index.njk src/download.njk
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add generated quickq article with internal links"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Build site
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_SITE_AUTH: ${{ secrets.BING_SITE_AUTH }}
        run: |
          if [ -n "$INDEXNOW_KEY" ]; then
            printf '%s' "$INDEXNOW_KEY" > "./src/${INDEXNOW_KEY}.txt"
          fi
          if [ -n "$BING_SITE_AUTH" ]; then
            printf '<?xml version="1.0"?>\n<users>\n  <user>%s</user>\n</users>\n' "$BING_SITE_AUTH" > ./src/BingSiteAuth.xml
          fi
          npm run build
          if [ -n "$INDEXNOW_KEY" ]; then
            printf '%s' "$INDEXNOW_KEY" > "./_site/${INDEXNOW_KEY}.txt"
          fi
          if [ -n "$BING_SITE_AUTH" ] && [ -f ./src/BingSiteAuth.xml ]; then
            cp ./src/BingSiteAuth.xml ./_site/BingSiteAuth.xml
          fi
      - name: IndexNow push
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_DOMAIN: quickq-cn.com
        run: node tools/bing-instant-push.js
      - name: Submit changed pages to Bing
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          SITE_URL: ${{ vars.SITE_URL != '' && vars.SITE_URL || 'https://quickq-cn.com' }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: npm run push:bing:${{ github.event.inputs.bing_scope || 'updated' }}
